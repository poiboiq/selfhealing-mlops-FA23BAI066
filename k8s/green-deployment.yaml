apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-green-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: green
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: green
    spec:
      containers:
        - name: sentiment-api
          image: YOUR_DOCKERHUB_USERNAME/sentiment-api:stable
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
