apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: blue
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: blue
    spec:
      containers:
        - name: sentiment-api
          image: YOUR_DOCKERHUB_USERNAME/sentiment-api:unstable
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: sentiment-logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: sentiment-logs
          persistentVolumeClaim:
            claimName: sentiment-logs-pvc
