global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: sentiment-ml-exporter
    scrape_interval: 10s
    static_configs:
      - targets:
          - localhost:8000
